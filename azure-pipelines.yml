# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  SONAR_HOST_URL: 'http://81.19.214.94:9000/'
  SONAR_PROJECT_KEY: 'test-public-repo'

steps:

# Install dependencies
- script: |
    sudo apt update
    sudo apt install -y openjdk-17-jdk unzip git curl
    java -version
  displayName: 'Install Java and Tools'

# Verify SonarQube server is reachable
- script: |
    echo "Checking SonarQube server status..."
    curl -v $(SONAR_HOST_URL)/api/system/status
  displayName: 'Check SonarQube Connectivity'

# Clone public repository for testing
- script: |
    git clone https://github.com/spring-projects/spring-petclinic.git
    cd spring-petclinic
    ls -la
  displayName: 'Clone Public GitHub Repo'

# Download and run SonarScanner
- script: |
    wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
    unzip sonar-scanner-cli-5.0.1.3006-linux.zip
    export PATH=$(pwd)/sonar-scanner-5.0.1.3006-linux/bin:$PATH

    cd spring-petclinic

    sonar-scanner -X \
      -Dsonar.projectKey=$(SONAR_PROJECT_KEY) \
      -Dsonar.sources=. \
      -Dsonar.host.url=$(SONAR_HOST_URL) \
      -Dsonar.login=$(SONAR_TOKEN)
  env:
    SONAR_TOKEN: $(SONAR_TOKEN)
  displayName: 'Run SonarQube Scan'